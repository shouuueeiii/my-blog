<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Me and My Friends — Sho's Blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #0c0c0f;
            --surface:   #13131a;
            --surface2:  #1c1c28;
            --border:    rgba(255,255,255,0.07);
            --accent:    #e8c97e;
            --accent2:   #7e9ee8;
            --text:      #e8e6e0;
            --muted:     #8a8a9a;

            --font-display: 'Playfair Display', Georgia, serif;
            --font-body:    'Outfit', sans-serif;
            --font-mono:    'DM Mono', monospace;
            --transition:   0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
            --radius:       12px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            font-weight: 300;
            overflow-x: hidden;
        }

        /* grain */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.015) 2px, rgba(0,0,0,0.015) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,0,0,0.01) 2px, rgba(0,0,0,0.01) 4px);
            pointer-events: none;
            z-index: 9999;
        }

        /* ===== FLOATING HEADER ===== */
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 200;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 5vw;
            background: linear-gradient(to bottom, rgba(12,12,15,0.9), transparent);
        }

        header h1 {
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-style: italic;
            color: var(--accent);
            letter-spacing: -0.01em;
        }

        .back-link {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.65);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.45rem;
            transition: color var(--transition);
        }
        .back-link svg { width: 13px; height: 13px; transition: transform var(--transition); }
        .back-link:hover { color: var(--accent); }
        .back-link:hover svg { transform: translateX(-3px); }

        /* ===== FULL-SCREEN PHOTO HERO ===== */
        .fs-hero {
            position: relative;
            width: 100%;
            height: 100vh;
            min-height: 560px;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
        }

        .fs-hero__img {
            position: absolute;
            inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
            animation: heroZoom 14s ease-in-out infinite alternate;
        }
        @keyframes heroZoom {
            from { transform: scale(1); }
            to   { transform: scale(1.07); }
        }

        /* layered gradient overlay — dark at top (header) and heavy at bottom (text) */
        .fs-hero__overlay {
            position: absolute;
            inset: 0;
            background:
                linear-gradient(to bottom,
                    rgba(12,12,15,0.55) 0%,
                    rgba(12,12,15,0.0) 30%,
                    rgba(12,12,15,0.0) 45%,
                    rgba(12,12,15,0.75) 70%,
                    rgba(12,12,15,0.97) 100%
                );
        }

        /* ===== TEXT OVERLAY ===== */
        .fs-hero__content {
            position: relative;
            z-index: 10;
            width: 100%;
            padding: 0 8vw 4.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .fs-label {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--accent2);
            display: flex;
            align-items: center;
            gap: 0.55rem;
            animation: slideUp 0.8s 0.1s ease both;
        }
        .fs-label::before {
            content: '';
            display: inline-block;
            width: 24px; height: 1px;
            background: var(--accent2);
        }

        .fs-title {
            font-family: var(--font-display);
            font-size: clamp(2.4rem, 6vw, 5rem);
            font-weight: 900;
            line-height: 1.08;
            color: #fff;
            max-width: 700px;
            animation: slideUp 0.8s 0.2s ease both;
        }
        .fs-title em { color: var(--accent); font-style: italic; }

        .fs-desc {
            max-width: 560px;
            color: rgba(232,230,224,0.78);
            font-size: 1rem;
            line-height: 1.85;
            animation: slideUp 0.8s 0.3s ease both;
        }

        /* page indicator dots */
        .fs-dots {
            display: flex;
            gap: 0.45rem;
            align-items: center;
            animation: slideUp 0.8s 0.4s ease both;
        }
        .fs-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            text-decoration: none;
            transition: background var(--transition), transform var(--transition);
        }
        .fs-dot.active { background: var(--accent); transform: scale(1.4); }
        .fs-dot:hover { background: rgba(232,201,126,0.6); }

        /* ===== SCROLL INDICATOR ===== */
        .scroll-hint {
            position: absolute;
            bottom: 1.8rem; right: 8vw;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            opacity: 0.4;
            animation: fadeIn 1s 1s ease both;
        }
        .scroll-hint span {
            font-family: var(--font-mono);
            font-size: 0.55rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #fff;
            writing-mode: vertical-rl;
        }
        .scroll-hint::after {
            content: '';
            width: 1px; height: 40px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.5), transparent);
            animation: scrollPulse 2s ease-in-out infinite;
        }
        @keyframes scrollPulse {
            0%, 100% { opacity: 0.4; transform: scaleY(1); }
            50%       { opacity: 0.9; transform: scaleY(1.2); }
        }

        /* ===== BELOW-FOLD SECTION (extra images + nav) ===== */
        .below-fold {
            background: var(--bg);
            padding: 5rem 8vw 6rem;
        }

        .below-label {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent2);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.55rem;
        }
        .below-label::before {
            content: '';
            display: inline-block;
            width: 20px; height: 1px;
            background: var(--accent2);
        }

        /* optional extra photo grid */
        .extra-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 4rem;
        }
        .extra-grid-item {
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
            cursor: pointer;
        }
        .extra-grid-item img {
            width: 100%;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }
        .extra-grid-item:hover img { transform: scale(1.05); }

        /* ===== PAGE NAV ===== */
        .content-divider { border: none; border-top: 1px solid var(--border); margin-bottom: 2.5rem; }

        .page-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .page-nav-btn {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            text-decoration: none;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.8rem 1.4rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color var(--transition), border-color var(--transition), transform var(--transition);
        }
        .page-nav-btn:hover {
            color: var(--accent);
            border-color: rgba(232,201,126,0.35);
            transform: translateY(-2px);
        }
        .page-nav-btn svg { width: 13px; height: 13px; }
        .page-nav-btn.prev:hover svg { transform: translateX(-3px); }
        .page-nav-btn.next:hover svg { transform: translateX(3px); }
        .page-nav-btn svg { transition: transform var(--transition); }
        .page-nav-center {
            font-family: var(--font-mono);
            font-size: 0.6rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
            opacity: 0.45;
        }

        /* ===== FOOTER ===== */
        footer {
            border-top: 1px solid var(--border);
            padding: 2rem 8vw;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .footer-name { font-family: var(--font-display); font-style: italic; font-size: 0.95rem; color: var(--accent); }
        footer p { font-family: var(--font-mono); font-size: 0.68rem; color: var(--muted); }

        /* ===== ANIMATIONS ===== */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 0.4; }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .fs-hero__content { padding: 0 6vw 3.5rem; }
            .extra-grid { grid-template-columns: 1fr 1fr; }
            .page-nav-center { display: none; }
            footer { flex-direction: column; gap: 0.4rem; text-align: center; }
        }
    </style>
</head>
<body>

    <!-- ===== FLOATING HEADER ===== -->
    <header>
        <h1>Sho's Blog</h1>
        <a href="../HTML/index.html" class="back-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
            Back to Blog
        </a>
    </header>

    <!-- ===== FULL-SCREEN HERO ===== -->
    <section class="fs-hero">
        <img class="fs-hero__img"
            src="../PICS/featured_1.jpg"
            alt="Me and my friends"
            onerror="this.src='https://placehold.co/1600x900/1c1c28/8a8a9a?text=Featured+Photo'">
        <div class="fs-hero__overlay"></div>

        <!-- text overlay at bottom -->
        <div class="fs-hero__content">
            <div class="fs-label">Featured Photos</div>
            <h1 class="fs-title">Me and my <em>Friends</em></h1>
            <p class="fs-desc">

            </p>
            <div class="fs-dots">
                <a href="featured1.html" class="fs-dot active" title="Photo 1"></a>
                <a href="featured2.html" class="fs-dot" title="Photo 2"></a>
                <a href="featured3.html" class="fs-dot" title="Photo 3"></a>
            </div>
        </div>

        <div class="scroll-hint"><span>More</span></div>
    </section>

    <!-- ===== BELOW-FOLD ===== -->
    <div class="below-fold">
        <div class="below-label">More from this memory</div>

        <div class="extra-grid">
            <div class="extra-grid-item">
                <img src="../PICS/featured_1.jpg" alt="Photo"
                    onerror="this.src='https://placehold.co/600x450/1c1c28/8a8a9a?text=Photo'">
            </div>
            <div class="extra-grid-item">
                <img src="../PICS/featured_1.jpg" alt="Photo"
                    onerror="this.src='https://placehold.co/600x450/1c1c28/8a8a9a?text=Photo'">
            </div>
            <div class="extra-grid-item">
                <img src="../PICS/featured_1.jpg" alt="Photo"
                    onerror="this.src='https://placehold.co/600x450/1c1c28/8a8a9a?text=Photo'">
            </div>
        </div>

        <hr class="content-divider">

        <nav class="page-nav">
            <a href="featured3.html" class="page-nav-btn prev">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                Previous
            </a>
            <span class="page-nav-center">1 of 3</span>
            <a href="featured2.html" class="page-nav-btn next">
                Next
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </a>
        </nav>
    </div>

    <footer>
        <span class="footer-name">Edrian Sedrik Halili</span>
        <p>&copy; 2024 My Website. All rights reserved.</p>
    </footer>

</body>
</html>
